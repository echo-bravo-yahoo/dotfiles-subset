# cc-allow Global Configuration
# Place at: ~/.config/cc-allow.toml
#
# Provides sensible defaults for common *nix commands and coreutils.
# Project-level configs can add stricter rules on top of this.

version = "2.0"

# ============================================================================
# SETTINGS
# ============================================================================

[settings]
session_max_age = "30d"  # auto-delete session configs older than this duration

# ============================================================================
# ALIASES
# ============================================================================

[aliases]
project = "path:$PROJECT_ROOT/**"
claude-user-config = "path:$HOME/.claude/**"
tmp = [
    "path:/tmp/**",
    "path:/private/tmp/**",
    # macOS $TMPDIR lives under /private/var/folders/<hash>/T/
    "path:/private/var/folders/*/*/T/**",
]
sensitive-read = ["path:$HOME/.ssh/**", "path:**/*.key", "path:**/*.pem"]
sensitive-write = [
    "path:$HOME/.*",
    "path:/etc/**",
    "path:/usr/**",
    "path:/bin/**",
    "path:/sbin/**",
    "path:/lib/**",
    "path:/lib64/**",
    "path:/var/**",
    "path:/boot/**",
    "path:/root/**",
    "path:/",
]
notes = [
    "path:$HOME/notes/**",
    "path:/mnt/d/Human Documents/notes/**",
    # cc-allow extracts bash args verbatim, so `find /mnt/d/Human\ Documents/notes`
    # produces a path containing a literal backslash. Match that form too.
    're:^/mnt/d/Human\\ Documents/notes(/.*)?$',
]
workspace = "path:$HOME/workspace/**"
aeby-scripts = "path:$HOME/.aeby/scripts/**"
windows-terminal-config = "path:/mnt/c/Users/heron/AppData/Local/Packages/Microsoft.WindowsTerminal_*/LocalState/**"
env-files = ["path:**/.env", "path:**/.env.*", "path:**/secrets/**"]

# ============================================================================
# BASH TOOL CONFIGURATION
# ============================================================================

[bash]
default = "ask"
dynamic_commands = "ask"
default_message = "Command not in allow list"
unresolved_commands = "ask"

[bash.constructs]
function_definitions = "deny"
background = "allow"
subshells = "ask"
heredocs = "allow"

# ============================================================================
# ALLOWED COMMANDS
# ============================================================================

[bash.allow]
commands = [
    # Claude scripts
    "alias:claude-user-config",
    "alias:aeby-scripts",
    # Tilde-form invocation: cc-allow sees literal "~" (no shell expansion)
    # so the aliases above do not match. Enumerate every executable in the
    # two script dirs as a literal string so every invocation form allows.
    # Regenerate with:
    #   find ~/.aeby/scripts ~/.claude/scripts -maxdepth 1 -type f -perm -u+x
    "~/.aeby/scripts/amq-dispatch",
    "~/.aeby/scripts/backup-crontab.sh",
    "~/.aeby/scripts/backup-homebrew.sh",
    "~/.aeby/scripts/backup-wildflower.sh",
